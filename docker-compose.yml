version: '3.8'

services:
  balzer-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: balzer_web
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env
    depends_on:
      balzer-db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - balzer_network

  balzer-db:
    image: mysql:8.0
    container_name: balzer_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - balzer_db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - balzer_network

volumes:
  balzer_db_data:

networks:
  balzer_network:
    driver: bridge
